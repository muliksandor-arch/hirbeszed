name: Deploy GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Configure Pages
        uses: actions/configure-pages@v6

      - name: Prepare static site
        shell: bash
        run: |
          rm -rf _site
          mkdir -p _site
          cp -R assets _site/assets
          cp -R docs _site/docs
          cp .nojekyll index.html styles.css app.js sw.js manifest.webmanifest news.json topics.json assistant-prompts.json _site/
          cp prototype-*.js prototype-*.css _site/
          cp PROTOTYPE.md PROJEKT_ALLAPOT_CODEX.txt ELOFIZETESI_SZABALYZAT.txt ELOFIZETESI_GOMB_MATRIX.md _site/

      - name: Upload static prototype
        uses: actions/upload-pages-artifact@v5
        with:
          path: _site

      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v5
